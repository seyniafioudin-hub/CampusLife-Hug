<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CampusLife Hub | Smart Student Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #0a2b3e;
      line-height: 1.4;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #121826;
      color: #e2e8f0;
    }
    body.dark .navbar,
    body.dark .service-card,
    body.dark .modal-box,
    body.dark .reservation-card {
      background: #1e293b;
    }
    body.dark .list-item {
      background: #273444;
    }
    body.dark .list-item:hover {
      background: #334155;
    }
    body.dark .empty-state {
      background: #1e293b;
      border-color: #334155;
    }

    /* navigation */
    .navbar {
      background: white;
      backdrop-filter: blur(0px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.3s;
    }

    .logo h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(130deg, #0f3b4f, #1f6e93);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .list-item:hover {
      background: #e2edf4;
      cursor: default;
    }

    .nav-btn {
      background: transparent;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      color: #2c5c74;
    }

    .nav-btn.active {
      background: #1e5a7a;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .nav-btn:hover:not(.active) {
      background: #e2edf4;
    }

    .search-wrapper {
      min-width: 200px;
      flex: 0.8;
      max-width: 320px;
    }

    .search-input {
      width: 100%;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .search-input:focus {
      border-color: #1e6f9f;
      box-shadow: 0 0 0 3px rgba(30, 111, 159, 0.2);
    }

    /* container */
    .container {
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 1.8rem 3rem;
    }

    /* pages */
    .page {
      display: none;
      animation: fadeSlide 0.22s ease-out;
    }

    .active-page {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }
    .welcome-text {
      font-size: 1.1rem;
      color: #4a6272;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 600;
    }

    /* tags bar */
    .tags-bar {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tag-btn {
      background: #eef2f8;
      border: none;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      color: #1a4b66;
    }

    .tag-btn.active-tag {
      background: #1e5a7a;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* grid cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.8rem;
    }

    .service-card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.3rem 1.2rem 1.2rem 1.2rem;
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2edf2;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .service-card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 28px -12px rgba(0, 32, 64, 0.18);
      border-color: #cbdde6;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f3b4f;
    }

    .star-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      transition: 0.1s;
      padding: 0 0.2rem;
      line-height: 1;
    }

    .star-btn:hover {
      transform: scale(1.1);
    }

    .card-desc {
      color: #4a6272;
      font-size: 0.9rem;
      margin: 0.5rem 0 1rem;
      line-height: 1.4;
      flex-grow: 1;
    }

    .card-tag {
      display: inline-block;
      background: #eef2fa;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      margin-bottom: 0.9rem;
      width: fit-content;
      color: #1f6e93;
    }

    .card-link {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f6e93;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    .card-link:hover {
      color: #0b4b6b;
      text-decoration: underline;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: #f8fafc;
      border-radius: 2rem;
      color: #5f7f92;
      font-weight: 500;
      border: 1px dashed #cbdde6;
      transition: background 0.3s;
    }

    /* favorites batch section */
    .batch-actions {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: flex-end;
    }

    .remove-batch-btn {
      background: #e3342f;
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .remove-batch-btn:hover {
      background: #c52827;
      transform: scale(0.98);
    }

    .checkbox-select {
      width: 20px;
      height: 20px;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .fav-checkbox-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    hr {
      margin: 0.5rem 0;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #7d9ab0;
    }

    /* ===== MODALE POPUP ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-box {
      background: white;
      border-radius: 1.4rem;
      width: 100%;
      max-width: 720px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.8rem;
      position: relative;
      transition: background 0.3s;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      border: none;
      background: #f1f5f9;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .modal-close:hover {
      background: #dee2e8;
    }
    .modal-title {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #e2edf2;
    }
    .modal-filter-bar {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .modal-search {
      flex: 1;
      min-width: 220px;
      padding: 0.5rem 0.9rem;
      border-radius: 30px;
      border: 1px solid #cbd5e1;
    }
    .price-filter {
      padding: 0.5rem;
      border-radius: 30px;
      border: 1px solid #cbd5e1;
      display: none;
    }
    .modal-content-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.9rem;
      background: #f8fafc;
      border-radius: 0.8rem;
      transition: transform 0.15s ease;
    }
    .item-icon {
      font-size: 1.6rem;
      width: 36px;
      text-align: center;
    }
    .item-price {
      margin-left: auto;
      background-color: #1e5a7a;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .reserve-btn {
      margin-left: 10px;
      background: #16a34a;
      color: white;
      border: none;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      cursor: pointer;
    }
    .reserve-btn:hover {
      background: #15803d;
    }

    /* Page Mes Réservations */
    .reservation-card {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s;
    }
    .reserve-delete {
      background: #e3342f;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 30px;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrapper {
        max-width: 100%;
      }
      .container {
        padding: 0 1rem 2rem;
      }
      .service-card {
        padding: 1rem;
      }
      .modal-box {
        padding: 1.2rem;
      }
      .modal-filter-bar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

  <!-- SERVICE CATEGORIES PAGE -->
  <div id="categoriesPage" class="page">

      <button class="tag-btn" data-tag="Administrative">📋 Administrative</button>

    <div id="categoryCardsGrid" class="cards-grid"></div>
  </div>

  <!-- MY FAVORITES PAGE (batch removal supported) -->

  <div id="favoritesPage" class="page">
    <div class="section-header">
      <h2>❤️ Your Saved Services</h2>
    </div>
    <div class="batch-actions">
      <button id="batchRemoveBtn" class="remove-batch-btn">🗑️ Remove Selected</button>
    </div>
    <div id="favoritesGrid" class="cards-grid"></div>
  </div>

  <!-- NOUVELLE PAGE MES RÉSERVATIONS -->
  <div id="reservationsPage" class="page">
    <div class="section-header">
      <h2>📅 Mes Réservations</h2>
    </div>
    <div id="reservationsList"></div>
  </div>

  <footer>⚡ Integrated campus portal • Stars persist • Batch removal ready</footer>
</div>

<!-- MODALE CONTENU SERVICE -->
<div class="modal-overlay" id="serviceModal">

    <div class="modal-filter-bar">
      <input type="text" class="modal-search" id="modalSearchInput" placeholder="Rechercher un élément...">

        <option value="mid">4€ à 6€</option>
        <option value="high">Plus de 6€</option>

    </div>
    <div id="modalContent" class="modal-content-list"></div>
  </div>
</div>

      {icon:"📄", text:"Demande validation crédits ECTS échange ERASMUS", canReserve:false},
      {icon:"🗓️", text:"Demande report d'examen pour motif médical", canReserve:false},
      {icon:"📋", text:"Formulaire annulation inscription semestre", canReserve:false},
      {icon:"🏫", text:"Attestation de diplomation provisoire", canReserve:false},
      {icon:"✉️", text:"Demande duplicata carte étudiante perdue", canReserve:false},
      {icon:"📂", text:"Demande consultation dossier étudiant administratif", canReserve:false},
      {icon:"⚖️", text:"Recours contre décision jury d'examen", canReserve:false}
    ],
    "💳 Financial Aid Hub": [
      {icon:"💸", text:"Demande bourse sur critères sociaux (BCS)", canReserve:false},
      {icon:"🎓", text:"Bourse mérite pour étudiants à haut classement", canReserve:false},
      {icon:"🏠", text:"Aide logement étudiant APL", canReserve:false},
      {icon:"💳", text:"Échelonnement paiement frais scolarité en 3 fois", canReserve:false},
      {icon:"💵", text:"Aide alimentaire urgente (resto U gratuit)", canReserve:false},
      {icon:"📊", text:"Suivi en temps réel traitement dossier bourse", canReserve:false},
      {icon:"🧾", text:"Télécharger avis de versement mensuel bourse", canReserve:false},
      {icon:"🏦", text:"Demande prêt étudiant taux réduit banque partenaire", canReserve:false},
      {icon:"📩", text:"Réclamation retard virement aide financière", canReserve:false},
      {icon:"💼", text:"Aides stage rémunéré pour étudiants précaires", canReserve:false}
    ],
    "🖥️ IT Support Desk": [
      {icon:"📶", text:"Activation connexion Wi-Fi campus eduroam", canReserve:false},
      {icon:"💻", text:"Installation pack Office 365 étudiant gratuit", canReserve:false},
      {icon:"🔑", text:"Réinitialisation mot de passe compte universitaire", canReserve:false},
      {icon:"🖨️", text:"Accès imprimantes campus & crédits impression", canReserve:true},
      {icon:"📧", text:"Configuration mail étudiant sur téléphone/ordinateur", canReserve:false},
      {icon:"🛠️", text:"Dépannage matériel ordinateur portable étudiant", canReserve:true},
      {icon:"☁️", text:"Stockage cloud 1To OneDrive offert aux inscrits", canReserve:false},
      {icon:"🔒", text:"Aide connexion VPN accès ressources bibliothèque distante", canReserve:false},
      {icon:"📱", text:"Installation application mobile services campus", canReserve:false},
      {icon:"🎓", text:"Formation logiciels statistiques (SPSS, R, Python) gratuite", canReserve:false}
    ]
  };

  // Stockage Local
  const FAV_KEY = "campus_favorites";
  const RESERVE_KEY = "campus_reservations";
  let favoritesIds = JSON.parse(localStorage.getItem(FAV_KEY)) || [];
  let reservations = JSON.parse(localStorage.getItem(RESERVE_KEY)) || [];

  // 2. Message bienvenue dynamique selon l'heure
  function setWelcomeMessage() {
    const heure = new Date().getHours();
    let msg = "";
    if (heure >= 5 && heure < 12) msg = "Bonjour, voici vos services campus essentiels";
    else if (heure >= 12 && heure < 18) msg = "Bon après-midi, accédez rapidement à tous vos outils";
    else msg = "Bonsoir, consultez vos services du campus";
    document.getElementById("welcomeMsg").textContent = msg;
  }

  // Mode sombre
  const themeBtn = document.getElementById("themeBtn");
  if(localStorage.getItem("darkMode") === "true") document.body.classList.add("dark");
  themeBtn.addEventListener("click", ()=>{
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
  });

  // MODALE GESTION
  const modalOverlay = document.getElementById("serviceModal");
  const modalTitleEl = document.getElementById("modalTitle");
  const modalContentEl = document.getElementById("modalContent");
  const modalCloseBtn = document.getElementById("modalCloseBtn");
  const modalSearchInput = document.getElementById("modalSearchInput");
  const priceFilterSelect = document.getElementById("priceFilterSelect");

  function openServiceModal(serviceName) {
    const items = MODAL_CONTENTS[serviceName];
    if (!items) return;
    modalTitleEl.textContent = serviceName;
    // Afficher filtre prix uniquement pour cantine
    if(serviceName === "🍽️ Dining Menu") priceFilterSelect.style.display = "block";
    else priceFilterSelect.style.display = "none";
    modalSearchInput.value = "";
    priceFilterSelect.value = "all";
    renderModalList(items, serviceName);
    modalOverlay.style.display = "flex";
  }

  function renderModalList(allItems, serviceName, searchTxt="", priceFilter="all") {
    let filtered = allItems.filter(el => el.text.toLowerCase().includes(searchTxt.toLowerCase()));
    // Filtre prix cantine
    if(serviceName === "🍽️ Dining Menu" && priceFilter !== "all") {
      if(priceFilter === "low") filtered = filtered.filter(x => x.priceNum <4);
      if(priceFilter === "mid") filtered = filtered.filter(x => x.priceNum >=4 && x.priceNum <=6);
      if(priceFilter === "high") filtered = filtered.filter(x => x.priceNum >6);
    }
    if(filtered.length === 0) {
      modalContentEl.innerHTML = `<div class="empty-state">Aucun résultat trouvé</div>`;
      return;
    }
    modalContentEl.innerHTML = filtered.map(item => {
      let priceHtml = item.price ? `<span class="item-price">${item.price}</span>` : "";
      let reserveBtn = item.canReserve ? `<button class="reserve-btn" data-service="${serviceName}" data-text="${item.text}">Réserver</button>` : "";
      return `
        <div class="list-item">
          <span class="item-icon">${item.icon}</span>
          <span>${item.text}</span>
          ${priceHtml}
          ${reserveBtn}
        </div>
      `;
    }).join("");
    // Event bouton réserver
    document.querySelectorAll(".reserve-btn").forEach(btn => {
      btn.onclick = () => {
        const nomService = btn.dataset.service;
        const texteItem = btn.dataset.text;
        addReservation(nomService, texteItem);
      }
    });
  }

  // Filtre modale en temps réel
  modalSearchInput.addEventListener("input", ()=>{
    const liste = MODAL_CONTENTS[modalTitleEl.textContent];
    renderModalList(liste, modalTitleEl.textContent, modalSearchInput.value, priceFilterSelect.value);
  });
  priceFilterSelect.addEventListener("change", ()=>{
    const liste = MODAL_CONTENTS[modalTitleEl.textContent];
    renderModalList(liste, modalTitleEl.textContent, modalSearchInput.value, priceFilterSelect.value);
  });

  function closeServiceModal() {
    modalOverlay.style.display = "none";
  }
  modalCloseBtn.addEventListener("click", closeServiceModal);
  modalOverlay.addEventListener("click", (e)=>{
    if(e.target === modalOverlay) closeServiceModal();
  });

  // Gestion Réservations
  function persistReservations() {
    localStorage.setItem(RESERVE_KEY, JSON.stringify(reservations));
    refreshCurrentPage();
  }
  function addReservation(service, itemText) {
    const existe = reservations.some(r => r.service === service && r.item === itemText);
    if(existe) return alert("Cette réservation existe déjà !");
    reservations.push({
      service: service,
      item: itemText,
      date: new Date().toLocaleString()
    });
    persistReservations();
    alert("Réservation enregistrée ! Allez sur la page Mes Réservations pour la consulter.");
  }
  function deleteReservation(index) {
    reservations.splice(index, 1);
    persistReservations();
  }
  function renderReservationsPage() {
    const container = document.getElementById("reservationsList");
    if(reservations.length === 0) {
      container.innerHTML = `<div class="empty-state">Aucune réservation pour l'instant. Ouvrez Bibliothèque, Cantine ou Navette et cliquez sur Réserver.</div>`;
      return;
    }
    container.innerHTML = reservations.map((res, idx) => `
      <div class="reservation-card">
        <div>
          <strong>${res.service}</strong>
          <p>${res.item}</p>
          <small>Réservé le : ${res.date}</small>
        </div>
        <button class="reserve-delete" data-idx="${idx}">Supprimer</button>
      </div>
    `).join("");
    document.querySelectorAll(".reserve-delete").forEach(btn => {
      btn.onclick = () => deleteReservation(parseInt(btn.dataset.idx));
    });
  }

  // ---------- STORAGE FAVORIS ----------
  function persistFavorites() {
    localStorage.setItem(FAV_KEY, JSON.stringify(favoritesIds));
    updateFavCount();
  }
  function updateFavCount(){
    document.getElementById("favCount").textContent = `Services enregistrés : ${favoritesIds.length}`;
  }
  function isFavorite(id) {
    return favoritesIds.includes(id);
  }
  function toggleFavoriteWithConfirm(serviceId, serviceName) {
    const alreadyFav = isFavorite(serviceId);
    let userConfirmed = false;
    if (!alreadyFav) {
      userConfirmed = confirm(`✨ Add "${serviceName}" to your favorites?`);
      if (userConfirmed) {
        if (!favoritesIds.includes(serviceId)) {
          favoritesIds.push(serviceId);
          persistFavorites();
        }
      }
    } else {
      userConfirmed = confirm(`❌ Remove "${serviceName}" from favorites?`);
      if (userConfirmed) {
        favoritesIds = favoritesIds.filter(id => id !== serviceId);
        persistFavorites();
      }
    }
    if (userConfirmed) {
      refreshCurrentPage();
    }
    return userConfirmed;
  }

  function batchRemoveFavorites(selectedIds) {
    if (selectedIds.length === 0) {
      alert("No services selected.");
      return false;
    }
    const confirmMsg = `⚠️ Permanently remove ${selectedIds.length} favorite(s)? This action cannot be undone.`;
    if (confirm(confirmMsg)) {
      favoritesIds = favoritesIds.filter(id => !selectedIds.includes(id));
      persistFavorites();
      refreshCurrentPage();
      return true;
    }
    return false;
  }

  // ---------- GLOBAL SEARCH & PAGE STATE ----------
  let currentPage = "home";
  let activeTag = "All";
  let searchQuery = "";
  const searchInput = document.getElementById("globalSearch");

  function filterServicesBySearch(services) {
    if (!searchQuery.trim()) return services;
    const q = searchQuery.trim().toLowerCase();
    return services.filter(service => 
      service.name.toLowerCase().includes(q) || 
      service.description.toLowerCase().includes(q)
    );
  }

  function getFilteredHomeServices() {
    return filterServicesBySearch([...SERVICES]);
  }

  function getFilteredCategoryServices() {
    let filtered = [...SERVICES];
    if (activeTag !== "All") {
      filtered = filtered.filter(s => s.tag === activeTag);
    }
    return filterServicesBySearch(filtered);
  }

  function generateCardHTML(service, showCheckbox = false, isChecked = false) {
    const starIcon = isFavorite(service.id) ? "★" : "☆";
    const starColor = isFavorite(service.id) ? "#f5b042" : "#9aaebf";
    const checkboxHtml = showCheckbox ? `<input type="checkbox" class="checkbox-select" data-id="${service.id}" ${isChecked ? "checked" : ""}>` : "";
    let linkHtml = `<span class="card-link open-modal-link" data-service-name="${service.name}">🔗 Open official service →</span>`;

    return `
      <div class="service-card" data-service-id="${service.id}">
        <div class="card-header">
          <div style="display: flex; align-items: center; gap: 8px;">
            ${showCheckbox ? checkboxHtml : ""}
            <span class="card-title">${service.name}</span>
          </div>
          <button class="star-btn" data-id="${service.id}" data-name="${service.name.replace(/'/g, "\\'")}" style="color: ${starColor};">${starIcon}</button>
        </div>
        <div class="card-tag">🏷️ ${service.tag}</div>
        <div class="card-desc">${service.description}</div>
        ${linkHtml}
      </div>
    `;
  }

  function renderHome() {
    const container = document.getElementById("homeCardsGrid");
    const servicesList = getFilteredHomeServices();
    if (servicesList.length === 0) {
      container.innerHTML = `<div class="empty-state">🔍 No services match "${searchQuery}". Try another keyword.</div>`;
      return;
    }
    container.innerHTML = servicesList.map(service => generateCardHTML(service, false)).join("");
    attachStarEvents();
    attachModalLinkEvents();
  }

  function renderCategories() {
    const container = document.getElementById("categoryCardsGrid");
    const filtered = getFilteredCategoryServices();
    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">🏷️ No results for ${activeTag !== "All" ? activeTag + " + " : ""}"${searchQuery}".<br>Clear filters to see more.</div>`;
      return;
    }
    container.innerHTML = filtered.map(service => generateCardHTML(service, false)).join("");
    attachStarEvents();
    attachModalLinkEvents();
  }

  function renderFavorites() {
    const container = document.getElementById("favoritesGrid");
    const favoriteServices = SERVICES.filter(svc => favoritesIds.includes(svc.id));
    if (favoriteServices.length === 0) {
      container.innerHTML = `<div class="empty-state">⭐ No favorites added yet. Go to Home or Categories and click the star ☆ to save services.</div>`;
      return;
    }
    container.innerHTML = favoriteServices.map(service => generateCardHTML(service, true, false)).join("");
    attachStarEvents();
    attachModalLinkEvents();
    attachCheckboxEventsForBatch();
  }

  function attachModalLinkEvents() {
    document.querySelectorAll(".open-modal-link").forEach(el=>{
      el.onclick = ()=>{
        const name = el.getAttribute("data-service-name");
        openServiceModal(name);
      }
    })
  }

  function attachStarEvents() {
    document.querySelectorAll(".star-btn").forEach(btn => {
      btn.removeEventListener("click", starClickHandler);
      btn.addEventListener("click", starClickHandler);
    });
  }
  function starClickHandler(e) {
    e.stopPropagation();
    const id = parseInt(this.getAttribute("data-id"));
    const name = this.getAttribute("data-name");
    toggleFavoriteWithConfirm(id, name);
  }

  let selectedFavIdsForRemoval = new Set();
  function attachCheckboxEventsForBatch() {
    const checkboxes = document.querySelectorAll("#favoritesGrid .checkbox-select");
    checkboxes.forEach(cb => {
      cb.removeEventListener("change", checkboxChangeHandler);
      cb.addEventListener("change", checkboxChangeHandler);
    });
    selectedFavIdsForRemoval.clear();
    checkboxes.forEach(cb => {
      const id = parseInt(cb.getAttribute("data-id"));
      if (cb.checked) selectedFavIdsForRemoval.add(id);
    });
  }
  function checkboxChangeHandler(e) {
    const id = parseInt(e.target.getAttribute("data-id"));
    if (e.target.checked) selectedFavIdsForRemoval.add(id);
    else selectedFavIdsForRemoval.delete(id);
  }

  function setupBatchRemoval() {
    const batchBtn = document.getElementById("batchRemoveBtn");
    if (batchBtn) {
      batchBtn.replaceWith(batchBtn.cloneNode(true));
      const newBtn = document.getElementById("batchRemoveBtn");
      newBtn.addEventListener("click", () => {
        if (selectedFavIdsForRemoval.size === 0) {
          alert("Please select at least one favorite to remove.");
          return;
        }
        const idsToRemove = Array.from(selectedFavIdsForRemoval);
        batchRemoveFavorites(idsToRemove);
        selectedFavIdsForRemoval.clear();
      });
    }
  }

  function showPage(pageId) {
    document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active-page");
    });
    document.getElementById(`${pageId}Page`).classList.add("active-page");
    document.querySelectorAll(".nav-btn").forEach(btn => {
      if (btn.getAttribute("data-page") === pageId) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    currentPage = pageId;
    refreshCurrentPage();
  }

  function refreshCurrentPage() {
    if (currentPage === "home") renderHome();
    else if (currentPage === "categories") {
      renderCategories();
      highlightActiveTag();
    }
    else if (currentPage === "favorites") {
      renderFavorites();
      setupBatchRemoval();
    }
    else if (currentPage === "reservations") renderReservationsPage();
  }

  function highlightActiveTag() {
    document.querySelectorAll(".tag-btn").forEach(btn => {
      const tagVal = btn.getAttribute("data-tag");
      if (tagVal === activeTag) btn.classList.add("active-tag");
      else btn.classList.remove("active-tag");
    });
  }

  function initTagFilters() {
    const tagBtns = document.querySelectorAll(".tag-btn");
    tagBtns.forEach(btn => {
      btn.addEventListener("click", (e) => {
        const tag = btn.getAttribute("data-tag");
        activeTag = tag;
        refreshCurrentPage();
      });
    });
  }

  function initSearch() {
    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      if (currentPage === "home") renderHome();
      else if (currentPage === "categories") renderCategories();
      else if (currentPage === "favorites") renderFavorites();
    });
  }
  function initNavBar() {
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const page = btn.getAttribute("data-page");
        showPage(page);
      });
    });
  }
  // Initialisation
  setWelcomeMessage();
  initNavBar();
  initTagFilters();
  initSearch();
  initFavorites();
  showPage("home");
</script>
</body>
</html>
